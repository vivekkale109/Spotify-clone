<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Spotify Clone</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <div class="sidebar">
    <h2>Spotify</h2>
    <ul>
      <li>Home</li>
      <li>Search</li>
      <li>Your Library</li>
    </ul>
  </div>

  <div class="main">
    <h1>Now Playing</h1>
    <div class="song-list">
      <div class="song" data-src="songs/song1.mp3">
        🎵 Song 1
      </div>
    </div>
  </div>

</div>

<div class="player">
  <button id="playBtn">▶</button>
  <input type="range" id="progress" value="0">
</div>

<script src="script.js"></script>
</body>
</html>
